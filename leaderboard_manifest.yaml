#
# Single source of truth mapping each leaderboard router to the website's data.
#
# `scripts/website/build_site_data.py` reads this together with the README
# (authoritative headline metrics) and the evaluated prediction files to
# regenerate the website's src/data, MERGING into the existing website data:
#   * every router here updates/inserts its row in routerMetrics/leaderboard.json
#     (matched by `website_name`);
#   * routers with a `prediction` file additionally have their per-difficulty
#     category_scores (key `category_key`) and per-query flip_labels
#     (file flip_labels_<flip_key>.json) regenerated;
#   * anything already on the website that is NOT listed here (externally
#     pre-computed baselines) is left untouched.
#
# `readme_name` matches the README leaderboard row (dash/case-insensitive).
# `website_name` is the exact "Router Name" string the website's leaderboard.json
# uses. `category_key` / `flip_key` are the website's existing (inconsistent) keys.
# Omit `prediction` for baselines that have no prediction file in RouterArena.

routers:
  # --- Routers submitted to RouterArena (derived data regenerated) ---
  - readme_name: "Sqwish Router"
    website_name: "Sqwish Router"
    prediction: "sqwish-router"
    category_key: "sqwish-router"
    flip_key: "sqwish-router"
    website:
      affiliation: "@namitha-sqwish"
      github_url: "https://github.com/namitha-sqwish"

  - readme_name: "AgentForge Router"
    website_name: "AgentForge Router"
    prediction: "agentforge-router"
    category_key: "agentforge"
    flip_key: "agentforge"
    website:
      affiliation: "@YangY-Z"
      github_url: "https://github.com/YangY-Z"
      type: "open-source"

  - readme_name: "Nadir Router"
